apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
        - name: devops-app
          image: devops-app:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATA_MONGODB_HOST
              value: "mongodb-svc"
            - name: SPRING_DATA_MONGODB_PORT
              value: "27017"
            - name: SPRING_DATA_MONGODB_DATABASE
              value: "test"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-svc
  labels:
    app: devops-app
spec:
  selector:
    app: devops-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http